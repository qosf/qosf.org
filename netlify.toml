# Netlify config for the infographic subdirectory (monorepo).
# Place this file at the repo root.

[build]
  base = "infographic"
  publish = "."
  command = "python3 generate_data.py"

# Ensure SVG files have the correct MIME type
[[headers]]
  for = "*.svg"
  [headers.values]
    Content-Type = "image/svg+xml"

# Cache images aggressively, keep HTML/JS fresh
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
