hardware_modalities:
  superconducting:
    description: Qubits built from superconducting circuits operating at millikelvin
      temperatures
    key_properties:
    - fast_gate_times
    - lithographic_fabrication
    - requires_dilution_refrigerator
    manufacturers:
    - name: IBM
      country: USA
      systems: IBM Quantum Heron, Condor, Flamingo
      qubits: 1000+
    - name: Google Quantum AI
      country: USA
      systems: Sycamore, Willow
      qubits: 100+
    - name: Rigetti Computing
      country: USA
      systems: Aspen, Ankaa, Cepheus
      qubits: 100+
  trapped_ion:
