metadata:
  title: Quantum Open-Source Ecosystem — Unified Data Source
  version: '1.1'
  description: Merged database combining project metadata, relationships, and logo
    URLs. Single source of truth for automated processing.
  last_updated: '2026-06-04'
  sources_merged:
  - quantum_open_source_ecosystem.yaml
  - quantum_ecosystem_logos.yaml
projects:
