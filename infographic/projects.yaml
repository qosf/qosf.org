    id: qiskit
    name: Qiskit
    type: programming_sdk
    organization: IBM Quantum
    country: USA
    first_release: 2017
    license: Apache 2.0
    language: Python (core in Rust)
    description: The world's most popular open-source SDK for quantum computing. Provides
      tools for building, optimizing, and executing quantum circuits.
    key_features:
    - circuit_construction
    - transpilation_optimization
    - noise_modeling
    - quantum_primitives
    - quantum_addons
    website: https://qiskit.org
    github: https://github.com/Qiskit/qiskit
    hardware_backends:
    - ibm_superconducting
    - ionq_trapped_ion
    - quantinuum_trapped_ion
    - rigetti_superconducting
    - iqm_superconducting
    - aqt_trapped_ion
    related_simulators:
    - qiskit_aer
    uses_compiler: tket
    used_by:
    - mitiq
    - qiskit_aer
    - qiskit_functions
    ecosystem_role: Central hub of the largest quantum open-source ecosystem
    node_type: programming_sdk
    category: programming_sdks
    logo:
